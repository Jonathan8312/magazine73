name: magazine73-wordpress

services:
  wordpress:
    image: wordpress:php8.3-apache
    container_name: magazine73-wordpress
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      WORDPRESS_DB_HOST: local-mariadb:3306
      WORDPRESS_DB_NAME: magazine73
      WORDPRESS_DB_USER: magazine73
      WORDPRESS_DB_PASSWORD: "Magazine73++"
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
        define('SCRIPT_DEBUG', true);
    volumes:
      - wordpress_data:/var/www/html
      - ./plugin/magazine73:/var/www/html/wp-content/plugins/magazine73
    networks:
      - docker-lan

volumes:
  wordpress_data:

networks:
  docker-lan:
    external: true
    name: docker-lan
