name: PHP compatibility

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  php-compatibility:
    name: PHP 8.0 syntax and PHPCompatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      - name: Lint plugin PHP files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find plugin/magazine73 -name '*.php' -print0)

      - name: Run PHPCS with PHPCompatibilityWP
        run: vendor/bin/phpcs --standard=phpcs.xml.dist
