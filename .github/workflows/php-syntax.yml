name: PHP syntax

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  php-syntax:
    name: Validate PHP syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none

      - name: Lint plugin PHP files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find plugin/magazine73 -name '*.php' -print0)
